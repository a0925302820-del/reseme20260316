<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歷 - AU114018091</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .resume {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: grid;
      grid-template-columns: 1fr 2fr;
    }

    .left {
      background: #2c2f4a;
      color: white;
      padding: 30px;
      text-align: center;
    }

    .left img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 4px solid white;
    }

    .left h2 {
      margin: 10px 0;
    }

    .left p {
      font-size: 14px;
      opacity: 0.8;
    }

    .right {
      padding: 30px;
    }

    h1 {
      margin-top: 0;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h3 {
      margin-bottom: 10px;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    ul {
      padding-left: 20px;
    }

    .tag {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      margin: 5px 5px 0 0;
      font-size: 12px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #764ba2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #5a3a85;
    }

    @media (max-width: 700px) {
      .resume {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="resume">

  <div class="left">
    <img src="https://via.placeholder.com/120" alt="頭像">
    <h2>你的名字</h2>
    <p>學號：AU114018091</p>
    <p>對心理學與人際關係有興趣</p>
  </div>

  <div class="right">
    <h1>個人履歷</h1>

    <div class="section">
      <h3>自我介紹</h3>
      <p id="intro">我是一個細心且具同理心的人，擅長觀察與理解他人的情緒，對心理領域有高度興趣。</p>
    </div>

    <div class="section">
      <h3>技能</h3>
      <span class="tag">溝通能力</span>
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">基礎JavaScript</span>
    </div>

    <div class="section">
      <h3>學歷</h3>
      <ul>
        <li>目前就讀高中 / 大學（自己改）</li>
      </ul>
    </div>

    <div class="section">
      <h3>興趣</h3>
      <ul>
        <li>閱讀</li>
        <li>音樂</li>
        <li>觀察人類行為</li>
      </ul>
    </div>

    <button class="btn" onclick="changeIntro()">換一句更帥的自介</button>
  </div>

</div>

<script>
function changeIntro() {
  const texts = [
    "我擅長傾聽與理解他人，是一個重視人際連結的人。",
    "我對心理學充滿熱情，希望未來能幫助他人走出困境。",
    "我擁有良好的觀察力與同理心，能敏銳察覺他人情緒變化。",
    "我喜歡深入思考人類行為，並從中找到意義與價值。"
  ];

  const random = Math.floor(Math.random() * texts.length);
  document.getElementById("intro").innerText = texts[random];
}
</script>

</body>
</html>
